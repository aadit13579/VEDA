<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VEDA — Visual Engine for Document Accessibility</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: http://localhost:*; media-src 'self' blob: mediastream:; connect-src 'self' http://localhost:* https://www.google.com https://*.googleapis.com https://*.gstatic.com wss://*.google.com; frame-src http://localhost:*"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link href="./assets/main.css" type="text/css" rel="stylesheet" />
  </head>

  <body>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- App Shell                                       -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="app">

      <!-- ─── Top Bar (persistent) ─── -->
      <header id="topBar">
        <div id="topBarBrand">
          <span id="topBarLogo">VEDA</span>
          <span id="topBarTagline">Document Accessibility Engine</span>
        </div>
        <div id="topBarControls">
          <!-- Font Size Controls -->
          <div id="fontSizeControls" aria-label="Font size">
            <button id="fontSmBtn"  class="font-size-btn" title="Small text"  aria-label="Small font size">A<sup>−</sup></button>
            <button id="fontMdBtn"  class="font-size-btn active" title="Default text" aria-label="Default font size">A</button>
            <button id="fontLgBtn"  class="font-size-btn" title="Large text"  aria-label="Large font size">A<sup>+</sup></button>
          </div>
          <!-- Theme Toggle -->
          <button id="themeToggleBtn" aria-label="Toggle dark mode" title="Toggle dark mode">
            <span id="themeIcon">☀</span>
          </button>
        </div>
      </header>

      <!-- ═══════════════════════════════════════════════ -->
      <!-- PHASE 1: Upload (Home)                          -->
      <!-- ═══════════════════════════════════════════════ -->
      <div id="phaseUpload">

        <div id="uploadHero">
          <h1 id="heroTitle">VEDA</h1>
          <p id="heroSubtitle">Upload a document and VEDA will read it aloud — clearly and accessibly.</p>
        </div>

        <!-- Upload Zone -->
        <div id="uploadZone" role="button" tabindex="0" aria-label="Click to upload a document">
          <div id="uploadIcon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p id="uploadPrimary">Click to upload a document</p>
          <p id="uploadSecondary">PDF, PNG, JPG, TIFF, Word, and PowerPoint supported</p>
        </div>

        <!-- File selected badge -->
        <div id="fileBadge" class="hidden">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="fileNameText"></span>
        </div>

        <!-- Action Buttons -->
        <div id="optionsRow" class="hidden">
          <button id="startBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start from Page 1
          </button>
          <button id="voiceBtn">
            <div id="voicePulse" class="hidden"></div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            <span id="voiceLabel">Go to a specific page by voice</span>
          </button>
        </div>

        <!-- Voice Feedback -->
        <div id="voiceFeedback" class="hidden">
          <span id="voiceTranscript"></span>
          <span id="parsedPage"></span>
        </div>

      </div>

      <!-- ═══════════════════════════════════════════════ -->
      <!-- PHASE 2: Results (Document View)               -->
      <!-- ═══════════════════════════════════════════════ -->
      <div id="phaseResults" class="hidden">

        <!-- Left Pane: Text Content -->
        <div id="leftPane">

          <!-- Status line for the left pane -->
          <div id="ttsControls">
            <span id="ttsStatus" class="tts-status" aria-live="polite">Ready</span>
          </div>

          <!-- Scrollable results content (region blocks with per-region play buttons) -->
          <div id="resultsPanel" class="results-scroll">
            <!-- Dynamically inserted .region-block elements -->
          </div>
        </div>

        <!-- Right Pane: Original Document Viewer -->
        <div id="rightPane">
          <h2 id="viewerTitle">Document Preview</h2>
          <div id="docImageContainer">
            <p id="docImagePlaceholder">Processing your document…</p>
            <!-- PDF viewer (shown for PDF files) -->
            <iframe
              id="docPdfViewer"
              class="hidden"
              title="Document Preview"
              aria-label="PDF document viewer"
            ></iframe>
            <!-- Image viewer (shown for image files) -->
            <img id="docImageViewer" class="hidden" src="" alt="Document page" />
          </div>
        </div>

      </div>

      <!-- ═══════════════════════════════════════════════ -->
      <!-- Progress Bar                                   -->
      <!-- ═══════════════════════════════════════════════ -->
      <div id="progressContainer" class="hidden">
        <div id="progressTrack">
          <div id="progressFill" style="width: 0%"></div>
        </div>
        <p id="progressText" aria-live="polite"></p>
      </div>

      <!-- Status Bar -->
      <div id="statusBar" class="hidden">
        <p id="statusText" aria-live="polite"></p>
      </div>

    </div><!-- /#app -->

    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
